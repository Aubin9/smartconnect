name: SmartConnect CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: smartconnect
          POSTGRES_PASSWORD: smartconnect
          POSTGRES_DB: smartconnect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://smartconnect:smartconnect@localhost:5432/smartconnect
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-secret-that-is-long-enough-for-nextauth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      # 1. Dynamically generate the .env file for Prisma and NextAuth
      - name: Create .env file
        run: |
          echo "DATABASE_URL=${{ env.DATABASE_URL }}" >> .env
          echo "NEXTAUTH_URL=${{ env.NEXTAUTH_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ env.NEXTAUTH_SECRET }}" >> .env

      - run: npx prisma generate
      - run: npx prisma db push
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
