services:
  postgres:
    image: postgres:16-alpine
    container_name: smartconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartconnect
      POSTGRES_PASSWORD: smartconnect
      POSTGRES_DB: smartconnect
    ports:
      - "5432:5432"
    volumes:
      - smartconnect_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartconnect -d smartconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartconnect-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  smartconnect_pgdata:
